name: Deploy Release Signal

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish. Defaults to deploy-test-<run-number>."
        required: false
        type: string
      name:
        description: "Release name. Defaults to the tag."
        required: false
        type: string
      prerelease:
        description: "Mark the release as a prerelease."
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  publish-release:
    name: Publish release to trigger deploy webhook
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="deploy-test-${{ github.run_number }}"
          fi
          NAME="${{ inputs.name }}"
          if [ -z "$NAME" ]; then
            NAME="$TAG"
          fi
          {
            echo "tag=$TAG"
            echo "name=$NAME"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          NAME: ${{ steps.meta.outputs.name }}
          PRERELEASE: ${{ inputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail
          args=(
            "$TAG"
            --repo "${{ github.repository }}"
            --target "${{ github.sha }}"
            --title "$NAME"
            --notes "Deploy signal release for hermes-deploy. Commit: ${{ github.sha }}"
          )
          if [ "$PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi
          gh release create "${args[@]}"

      - name: Summary
        shell: bash
        run: |
          echo "Published release ${{ steps.meta.outputs.tag }} for ${{ github.repository }} @ ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "This emits the GitHub release.published webhook consumed by hermes-deploy/Hermes." >> "$GITHUB_STEP_SUMMARY"
