name: Signal Hermes Nomad Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Nomad deployment environment label
        required: true
        default: staging
      service:
        description: Service/job to deploy
        required: true
        default: gmeet-pipeline
      nomad_job_file:
        description: Nomad job file path on the Hermes/Nomad host
        required: true
        default: /Users/inference2/nomad/jobs/gmeet-pipeline.nomad

jobs:
  signal-hermes:
    runs-on: ubuntu-latest
    steps:
      - name: Send deploy command signal to Hermes
        env:
          HERMES_WEBHOOK_URL: ${{ secrets.HERMES_WEBHOOK_URL }}
          HERMES_WEBHOOK_SECRET: ${{ secrets.HERMES_WEBHOOK_SECRET }}
          SERVICE: ${{ inputs.service }}
          ENVIRONMENT: ${{ inputs.environment }}
          NOMAD_JOB_FILE: ${{ inputs.nomad_job_file }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          if [ -z "${HERMES_WEBHOOK_URL:-}" ]; then
            echo "HERMES_WEBHOOK_URL secret is required" >&2
            exit 1
          fi
          if [ -z "${HERMES_WEBHOOK_SECRET:-}" ]; then
            echo "HERMES_WEBHOOK_SECRET secret is required" >&2
            exit 1
          fi

          nomad_command="nomad job run -detach ${NOMAD_JOB_FILE}"

          payload="$(jq -n \
            --arg event_type "deploy.command" \
            --arg repo "$REPO" \
            --arg sha "$SHA" \
            --arg ref "$REF_NAME" \
            --arg run_id "$RUN_ID" \
            --arg actor "$ACTOR" \
            --arg service "$SERVICE" \
            --arg environment "$ENVIRONMENT" \
            --arg nomad_job_file "$NOMAD_JOB_FILE" \
            --arg nomad_command "$nomad_command" \
            '{
              event_type: $event_type,
              repo: $repo,
              sha: $sha,
              ref: $ref,
              run_id: $run_id,
              actor: $actor,
              service: $service,
              environment: $environment,
              requested_by: "github-actions",
              nomad_job_file: $nomad_job_file,
              nomad_command: $nomad_command
            }'
          )"

          signature="$(printf '%s' "$payload" | openssl dgst -sha256 -hmac "$HERMES_WEBHOOK_SECRET" -hex | awk '{print $2}')"

          curl -fsS -X POST "$HERMES_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Signature: ${signature}" \
            -H "X-Request-ID: gmeet-deploy-${RUN_ID}" \
            --data "$payload"
